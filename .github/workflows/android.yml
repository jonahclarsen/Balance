name: Build Android

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build debug + signed release
    runs-on: ubuntu-latest

    env:
      # The vendored OpenSSL that SQLCipher links against is cross-compiled with
      # the Android NDK. openssl-src locates the toolchain through these.
      NDK_VERSION: "27.2.12479018"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${NDK_VERSION}" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          NDK="${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}"
          echo "ANDROID_NDK_ROOT=${NDK}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${NDK}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${NDK}" >> "$GITHUB_ENV"

      - name: Expose NDK toolchain with legacy tool names
        run: |
          # NDK r23+ ships only llvm-prefixed binutils (llvm-ar, llvm-ranlib, ...).
          # The vendored OpenSSL build still calls the GCC-era names such as
          # aarch64-linux-android-ranlib, so add the toolchain to PATH and create
          # the legacy-named symlinks it expects, for every ABI we cross-compile.
          TOOLCHAIN="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "${TOOLCHAIN}" >> "$GITHUB_PATH"
          for prefix in aarch64-linux-android x86_64-linux-android; do
            for tool in ar ranlib nm strip; do
              ln -sf "${TOOLCHAIN}/llvm-${tool}" "${TOOLCHAIN}/${prefix}-${tool}"
            done
          done

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-android-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-android-cargo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Android camera QR fixture
        run: node .github/scripts/generate-android-sync-qr.mjs

      - name: Build cr-sqlite loadable extension (Android .so per ABI)
        # Cross-compiles crsqlite.so for each ABI (uses the NDK clang set up
        # above) into src-tauri/resources/android/<abi>/. Loaded at runtime via
        # load_extension; bundled as a jniLib below.
        run: bash scripts/build-crsqlite.sh android

      - name: Initialize Android project
        run: pnpm tauri android init

      - name: Bundle the offline Android barcode model
        # The upstream plugin uses the dynamically downloaded Play Services
        # model. Bundle ML Kit instead so scanning works immediately, including
        # on Android devices and CI images without Google Play Services.
        run: node .github/scripts/configure-android-barcode-scanner.mjs

      - name: Bundle cr-sqlite extension as jniLibs
        # jniLibs/<abi>/libcrsqlite.so is extracted by Android into the app's
        # nativeLibraryDir, so the dynamic linker resolves it by soname at load.
        run: |
          JNI="src-tauri/gen/android/app/src/main/jniLibs"
          for abi in arm64-v8a x86_64; do
            mkdir -p "$JNI/$abi"
            cp "src-tauri/resources/android/$abi/crsqlite.so" "$JNI/$abi/libcrsqlite.so"
          done
          echo "jniLibs:" && find "$JNI" -name '*.so'

      - name: Apply app launcher icons
        # `tauri android init` scaffolds gen/android with placeholder launcher
        # icons. Overlay the committed mipmaps (generated from app-icon.png with
        # `tauri icon`) so the APK uses the real app icon.
        run: cp -R src-tauri/icons/android/. src-tauri/gen/android/app/src/main/res/

      - name: Build universal debug APK (arm64 + x86_64)
        run: pnpm tauri android build --apk --debug --target aarch64 --target x86_64

      - name: Locate and verify APK
        id: apk
        run: |
          APK_PATH="$(find src-tauri/gen/android -name '*.apk' -path '*debug*' | head -n 1)"
          test -n "$APK_PATH"
          echo "Found APK at $APK_PATH"
          file "$APK_PATH"
          # The APK must bundle the Rust native library for both ABIs, otherwise
          # the app cannot start on a device or the emulator.
          unzip -l "$APK_PATH" | tee apk-contents.txt
          grep -q "lib/arm64-v8a/libbalance_lib.so" apk-contents.txt
          grep -q "lib/x86_64/libbalance_lib.so" apk-contents.txt
          cp "$APK_PATH" balance-debug.apk
          echo "path=balance-debug.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: Balance-android-debug
          path: |
            balance-debug.apk
            sync-e2e-pairing.png
            sync-e2e-pairing-code.txt
          if-no-files-found: error

      - name: Set up Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing GitHub Actions secret: $name"
              exit 1
            fi
          done

          KEYSTORE_PATH="$RUNNER_TEMP/balance-upload-keystore.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          export ANDROID_KEYSTORE_PATH="$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"

          node .github/scripts/configure-android-signing.mjs

      - name: Build signed release APK and AAB (arm64 + x86_64)
        run: |
          VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid Android release version: $VERSION"
            exit 1
          fi
          echo "Building Android release version $VERSION"
          pnpm tauri android build \
            --config "{\"version\":\"$VERSION\"}" \
            --apk --aab --target aarch64 --target x86_64

      - name: Locate and verify signed release
        run: |
          set -o pipefail
          APK_PATH="$(find src-tauri/gen/android -name '*.apk' -path '*release*' | head -n 1)"
          AAB_PATH="$(find src-tauri/gen/android -name '*.aab' -path '*release*' | head -n 1)"
          APKSIGNER="$(find "$ANDROID_SDK_ROOT/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -n "$APK_PATH"
          test -n "$AAB_PATH"
          test -x "$APKSIGNER"

          echo "Found APK at $APK_PATH"
          echo "Found AAB at $AAB_PATH"
          "$APKSIGNER" verify --verbose --print-certs "$APK_PATH" | tee android-release-signature.txt
          jarsigner -verify "$AAB_PATH" | tee android-aab-verification.txt
          grep -q "jar verified" android-aab-verification.txt

          cp "$APK_PATH" balance-release.apk
          cp "$AAB_PATH" balance-release.aab

      - name: Upload signed release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Balance-android-release
          path: |
            balance-release.apk
            balance-release.aab
            android-release-signature.txt
            android-aab-verification.txt
          if-no-files-found: error

  smoke-test:
    name: Android pairing + sync E2E
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download APK artifact
        uses: actions/download-artifact@v7
        with:
          name: Balance-android-debug

      - name: Pair and sync two isolated app installations
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          # The AOSP image provides Android/WebView without launching a second
          # profile's full Play Services fleet, which can OOM the CI runner.
          target: default
          force-avd-creation: false
          # Feed the real QR fixture to Android's emulated back camera. The UI
          # test must scan it; it never types the joiner's pairing code.
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back imagefile:${{ github.workspace }}/sync-e2e-pairing.png
          disable-animations: true
          # The runner executes the `script` input line-by-line in separate
          # shells, so the test logic lives in a committed file run as one process.
          script: bash .github/scripts/android-smoke-test.sh

      - name: Upload logcat
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: emulator-logcat
          path: |
            logcat*.txt
            sync-e2e-*.xml
            sync-e2e-*.png
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs:
      - build
      - smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download signed release artifacts
        uses: actions/download-artifact@v7
        with:
          name: Balance-android-release

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # A run attempt is immutable, so every successful build gets its own
          # release without overwriting one from an earlier run or rerun. Keep
          # the generated tag outside the workflow's v*.*.* trigger to avoid a
          # release tag recursively starting another Android build.
          RELEASE_TAG="android-build-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          RELEASE_TITLE="Balance Android build #${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          COMMIT_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"

          {
            echo "Automated Android release built from [${GITHUB_SHA:0:7}](${COMMIT_URL})."
            echo
            echo "Source ref: \`${GITHUB_REF_NAME}\`"
            echo
            echo "The signed universal APK and Play Store AAB passed signing verification and the Android pairing/sync emulator test."
            echo
            echo "[GitHub Actions run](${RUN_URL})"
          } > "$RUNNER_TEMP/release-notes.md"

          gh release create "$RELEASE_TAG" \
            balance-release.apk \
            balance-release.aab \
            android-release-signature.txt \
            android-aab-verification.txt \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            --latest
