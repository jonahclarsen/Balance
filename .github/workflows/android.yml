name: Build Android APK

on:
  push:
    branches:
      - main
      - android-build
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    env:
      # The vendored OpenSSL that SQLCipher links against is cross-compiled with
      # the Android NDK. openssl-src locates the toolchain through these.
      NDK_VERSION: "27.2.12479018"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${NDK_VERSION}" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          NDK="${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}"
          echo "ANDROID_NDK_ROOT=${NDK}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${NDK}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${NDK}" >> "$GITHUB_ENV"

      - name: Expose NDK toolchain with legacy tool names
        run: |
          # NDK r23+ ships only llvm-prefixed binutils (llvm-ar, llvm-ranlib, ...).
          # The vendored OpenSSL build still calls the GCC-era names such as
          # aarch64-linux-android-ranlib, so add the toolchain to PATH and create
          # the legacy-named symlinks it expects, for every ABI we cross-compile.
          TOOLCHAIN="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "${TOOLCHAIN}" >> "$GITHUB_PATH"
          for prefix in aarch64-linux-android x86_64-linux-android; do
            for tool in ar ranlib nm strip; do
              ln -sf "${TOOLCHAIN}/llvm-${tool}" "${TOOLCHAIN}/${prefix}-${tool}"
            done
          done

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-android-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-android-cargo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Android project
        run: pnpm tauri android init

      - name: Build universal debug APK (arm64 + x86_64)
        run: pnpm tauri android build --apk --debug --target aarch64 --target x86_64

      - name: Locate and verify APK
        id: apk
        run: |
          APK_PATH="$(find src-tauri/gen/android -name '*.apk' -path '*debug*' | head -n 1)"
          test -n "$APK_PATH"
          echo "Found APK at $APK_PATH"
          file "$APK_PATH"
          # The APK must bundle the Rust native library for both ABIs, otherwise
          # the app cannot start on a device or the emulator.
          unzip -l "$APK_PATH" | tee apk-contents.txt
          grep -q "lib/arm64-v8a/libbalance_lib.so" apk-contents.txt
          grep -q "lib/x86_64/libbalance_lib.so" apk-contents.txt
          cp "$APK_PATH" balance-debug.apk
          echo "path=balance-debug.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: Balance-android-debug
          path: balance-debug.apk
          if-no-files-found: error

  smoke-test:
    name: Launch on emulator
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download APK artifact
        uses: actions/download-artifact@v7
        with:
          name: Balance-android-debug

      - name: Launch app on emulator and check for crashes
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # The runner executes the `script` input line-by-line in separate
          # shells, so the test logic lives in a committed file run as one process.
          script: bash .github/scripts/android-smoke-test.sh

      - name: Upload logcat
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: emulator-logcat
          path: logcat.txt
          if-no-files-found: ignore
